<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>
            <a href = "{% url 'home' %}">
                Django Blog 
            </a>
        </h1>

        <div>
            <a href="{% url 'post_new' %}">
                + New Blog Post 
            </a>
        </div>

        
    </header>


    {% if user.is_authenticated %}
        <p>Hi {{ user.username }} you are Welcomed here!</p>
        <p>
            <a href="{% url 'logout' %}">Log out</a>
        </p>
    {% else %}
        <p>You are not logged in.</p>
        <a href="{% url 'login' %}">Log In</a>
    {% endif %}
    
    {% block content %}
        <p> Welcome from base </p>
    {% endblock content %}

</body>
</html>
